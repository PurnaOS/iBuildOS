# iBuildOS bundle config — this repo dogfoods iBuildOS.
profile:
  name: ibuildos-base
  version: 0.5.0
root: docs
types: types
artifacts:
  - requirements/**
  - work/**
  - tests/**
  - changes/**
  - scenarios/**
  - decisions/**
  - identity/**
  - architecture/**
  - runbooks/**
  - coordination/**
code_field: code
# External tools iBuild orchestrates (it reinvents none of them).
tooling:
  test: bun test
  lint:
    - bun run typecheck
    - bun run check:literals
  source:
    - src/**
