<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iBuild · traceability</title>
<style>
:root{
  --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2330; --muted:#6b7384; --line:#e3e6ec;
  --accent:#3b5bdb; --good:#2f9e63; --warn:#c98a16; --bad:#d6453d; --chip:#eef1f6;
  --shadow:0 1px 2px rgba(20,30,60,.06),0 4px 16px rgba(20,30,60,.05);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0f1218; --panel:#171b24; --ink:#e7eaf0; --muted:#9aa3b5; --line:#262c38;
    --accent:#7d93f5; --good:#46c07e; --warn:#e0ad4a; --bad:#f0726a; --chip:#222836;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
header.top{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.brand{font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent)}
.health{display:flex;gap:14px;color:var(--muted);font-size:13px;flex-wrap:wrap;align-items:center}
.health b{color:var(--ink)}
.health .pill{padding:2px 9px;border-radius:999px;background:var(--chip);border:1px solid var(--line)}
.health .pill.bad{color:var(--bad)} .health .pill.warn{color:var(--warn)} .health .pill.good{color:var(--good)}
.grow{flex:1}
.search{padding:7px 11px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);min-width:200px}
nav.tabs{display:flex;gap:4px;padding:10px 20px 0;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:9;flex-wrap:wrap}
nav.tabs a{padding:8px 14px;border-radius:9px 9px 0 0;color:var(--muted);font-weight:600;border:1px solid transparent;border-bottom:none}
nav.tabs a.active{color:var(--ink);background:var(--bg);border-color:var(--line)}
main{padding:22px 20px 60px;max-width:1280px;margin:0 auto}
h2.view{margin:0 0 4px;font-size:18px}
.sub{color:var(--muted);margin:0 0 18px;font-size:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:top}
th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--bg)}
tr:last-child td{border-bottom:none}
tr.row{cursor:pointer}
tr.row:hover td{background:var(--bg)}
.chip{display:inline-block;padding:1px 8px;border-radius:999px;background:var(--chip);border:1px solid var(--line);font-size:12px;color:var(--muted);white-space:nowrap}
.status{display:inline-block;padding:1px 9px;border-radius:999px;font-size:12px;font-weight:600;
  background:hsl(var(--h,212) 60% 93%);color:hsl(var(--h,212) 45% 32%);border:1px solid hsl(var(--h,212) 45% 82%)}
@media (prefers-color-scheme:dark){.status{background:hsl(var(--h,212) 35% 22%);color:hsl(var(--h,212) 70% 78%);border-color:hsl(var(--h,212) 35% 32%)}}
.ok{color:var(--good);font-weight:700}
.no{color:var(--warn);font-weight:700}
.count{font-variant-numeric:tabular-nums}
.gaps{margin:0;padding:0;list-style:none;font-size:12px}
.gaps li{color:var(--bad)}
.gaps li.warn{color:var(--warn)}
.muted{color:var(--muted)}
/* board */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.col{flex:0 0 270px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px}
.col h3{margin:2px 4px 10px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.col h3 .n{color:var(--muted);font-weight:500}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow)}
.tcard:hover{border-color:var(--accent)}
.tcard .ttl{font-weight:600;margin-bottom:7px}
.tcard .meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.dots{display:flex;gap:5px;margin-left:auto}
.dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
.dot.on{background:var(--good)} .dot.bad{background:var(--bad)}
.legend{display:flex;gap:16px;color:var(--muted);font-size:12px;margin:0 0 14px;flex-wrap:wrap;align-items:center}
.legend .dot{display:inline-block;vertical-align:middle;margin-right:5px}
/* planning */
.pgroup{margin-bottom:18px}
.pgroup .phead{display:flex;gap:10px;align-items:baseline;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.pgroup .phead .t{font-weight:700;font-size:15px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
/* detail */
.detail{display:grid;grid-template-columns:1fr;gap:16px}
.kv{width:100%;border-collapse:collapse}
.kv td{border-bottom:1px solid var(--line);padding:7px 10px}
.kv td.k{color:var(--muted);width:160px;font-size:13px}
.echip{display:inline-block;margin:0 6px 6px 0;padding:4px 10px;border-radius:8px;background:var(--chip);border:1px solid var(--line);font-size:12.5px}
.echip.bad{border-color:var(--bad);color:var(--bad)}
.back{display:inline-block;margin-bottom:14px;font-size:13px}
.section-t{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:6px 0 8px}
.excerpt{color:var(--muted);font-size:13px;margin:8px 0 0}
.empty{color:var(--muted);padding:30px;text-align:center}
/* graph */
.graphwrap{border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden;height:72vh}
.graphwrap svg{width:100%;height:100%;cursor:grab;user-select:none}
.graphwrap svg:active{cursor:grabbing}
.collabel{fill:var(--muted);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.gnode rect{fill:var(--panel);stroke:var(--line);stroke-width:1.5}
.gnode text{fill:var(--ink);font-size:12px}
.gnode{cursor:pointer}
.gnode:hover rect{stroke:var(--accent)}
.gnode.n-req rect{fill:hsl(212 70% 95%)} .gnode.n-task rect{fill:hsl(150 50% 95%)}
.gnode.n-test rect{fill:hsl(280 50% 96%)} .gnode.n-bad rect{stroke:var(--bad);stroke-width:2}
@media (prefers-color-scheme:dark){
  .gnode.n-req rect{fill:hsl(212 40% 22%)} .gnode.n-task rect{fill:hsl(150 30% 20%)}
  .gnode.n-test rect{fill:hsl(280 25% 24%)}
}
path.e-chain{stroke:var(--good);stroke-width:1.6;fill:none;opacity:.75}
path.e-other{stroke:var(--muted);stroke-width:1.2;fill:none;opacity:.4}
</style>
</head>
<body>
<header class="top">
  <div class="brand"><span class="dot"></span> iBuild</div>
  <div class="health" id="health"></div>
  <div class="grow"></div>
  <input class="search" id="search" placeholder="filter by id, title, type…" autocomplete="off">
</header>
<nav class="tabs" id="tabs">
  <a href="#trace" data-t="trace">Requirements</a>
  <a href="#board" data-t="board">Board</a>
  <a href="#plan" data-t="plan">Planning</a>
  <a href="#graph" data-t="graph">Graph</a>
</nav>
<main id="view"></main>

<script id="data" type="application/json">/*__IBUILD_DATA__*/</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("data").textContent);
const NODES = DATA.nodes || [];
const CH = DATA.chain || {};
const BYKEY = {}; NODES.forEach(n => BYKEY[n.key] = n);
const CHAIN_RELS = new Set([CH.implementsRel, CH.verifiesRel, CH.verifiedByRel, CH.parentRel].filter(Boolean));
const PASSING = new Set(CH.passingStatuses || []);
const view = document.getElementById("view");
let SEARCH = "";

// ---- helpers ----
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function hue(s){let h=7;for(let i=0;i<(s||"").length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h%360;}
function statusChip(s){if(!s)return '<span class="muted">—</span>';return `<span class="status" style="--h:${hue(s)}">${esc(s)}</span>`;}
function short(s,n){s=String(s||"");return s.length>(n||26)?s.slice(0,(n||26)-1)+"…":s;}
function go(h){location.hash="#"+h;}
function fieldNonEmpty(f,k){if(!f)return false;const v=f[k];if(v==null)return false;return Array.isArray(v)?v.length>0:String(v).trim()!=="";}
function matches(n){if(!SEARCH)return true;const q=SEARCH;return (n.title+" "+n.key+" "+n.type+" "+(n.status||"")).toLowerCase().includes(q);}
function idOf(n){return (n.fields&&typeof n.fields.id==="string")?n.fields.id:n.key;}

// requirement coverage: implemented (directly or via parent) + verified
function impl(n){
  if((n.out||[]).some(e=>e.rel===CH.implementsRel&&e.resolved))return true;
  const p=(n.out||[]).find(e=>e.rel===CH.parentRel&&e.resolved);
  if(p&&BYKEY[p.to])return (BYKEY[p.to].out||[]).some(e=>e.rel===CH.implementsRel&&e.resolved);
  return false;
}
function hasErr(n){return (n.findings||[]).some(f=>f.sev==="error");}

// ---- health header ----
(function health(){
  const reqs=NODES.filter(n=>n.cap.requirement);
  const covered=reqs.filter(n=>n.traced).length;
  let errs=0,warns=0;
  NODES.forEach(n=>(n.findings||[]).forEach(f=>f.sev==="error"?errs++:warns++));
  const pct=reqs.length?Math.round(100*covered/reqs.length):100;
  const tone=pct===100?"good":pct>=60?"warn":"bad";
  const ts=DATA.traceScore??100;
  const tsTone=ts===100?"good":ts>=60?"warn":"bad";
  document.getElementById("health").innerHTML=
    `<span class="pill ${tsTone}" title="requirements that are implemented AND verified"><b>Trace Score ${ts}%</b> · ${DATA.reqCovered||0}/${DATA.reqTotal||0} deep-covered</span>`+
    `<span class="pill ${tone}"><b>${covered}/${reqs.length}</b> requirements traced (${pct}%)</span>`+
    `<span class="pill">${NODES.length} artifacts</span>`+
    `<span class="pill ${errs?'bad':'good'}"><b>${errs}</b> errors</span>`+
    `<span class="pill ${warns?'warn':''}"><b>${warns}</b> warnings</span>`;
})();

// ---- trace view ----
function renderTrace(){
  const reqs=NODES.filter(n=>n.cap.requirement&&matches(n));
  if(!reqs.length){view.innerHTML=emptyMsg("No requirement-type artifacts.");return;}
  const rows=reqs.map(n=>{
    const gaps=(n.findings||[]).filter(f=>f.rule.indexOf("chain.")===0);
    const gapHtml=gaps.length?`<ul class="gaps">${gaps.map(f=>`<li class="${f.sev==='error'?'':'warn'}">${esc(f.msg)}</li>`).join("")}</ul>`:'<span class="muted">—</span>';
    return `<tr class="row" onclick="go('node/${encodeURIComponent(n.key)}')">
      <td><b>${esc(idOf(n))}</b><div class="muted">${esc(short(n.title,60))}</div></td>
      <td>${statusChip(n.status)}</td>
      <td class="count">${(n.implementers||[]).length}</td>
      <td class="count">${(n.verifiers||[]).length}</td>
      <td class="${n.traced?'ok':'no'}">${n.traced?'✓ traced':'⚠ gap'}</td>
      <td>${gapHtml}</td></tr>`;
  }).join("");
  view.innerHTML=`<h2 class="view">Requirements traceability</h2>
    <p class="sub">Every requirement and whether the Requirement→Task→Code→Test chain closes around it — derived from the same engine that gates the repo.</p>
    <table><thead><tr><th>Requirement</th><th>Status</th><th>Implementers</th><th>Tests</th><th>Chain</th><th>Gaps</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ---- board view ----
function boardColumns(items){
  const order=[],seen=new Set();
  Object.keys(DATA.statusOrder||{}).sort().forEach(t=>(DATA.statusOrder[t]||[]).forEach(s=>{if(!seen.has(s)){seen.add(s);order.push(s);}}));
  items.forEach(n=>{const s=n.status;if(s&&!seen.has(s)){seen.add(s);order.push(s);}});
  const buckets={};order.forEach(s=>buckets[s]=[]);const none=[];
  items.forEach(n=>{const s=n.status;if(s&&buckets[s])buckets[s].push(n);else none.push(n);});
  return {order,buckets,none};
}
function chainDots(n){
  const r=impl(n), c=fieldNonEmpty(n.fields,CH.codeField);
  const t=(n.out||[]).some(e=>e.rel===CH.verifiedByRel&&e.resolved&&BYKEY[e.to]&&PASSING.has(BYKEY[e.to].status));
  const bad=hasErr(n);
  const d=(on,label)=>`<span class="dot ${on?'on':(bad?'bad':'')}" title="${label}"></span>`;
  return `<span class="dots">${d(r,'traces to a requirement')}${d(c,'has code')}${d(t,'has a passing-path test')}</span>`;
}
function tcard(n){
  return `<div class="tcard" onclick="go('node/${encodeURIComponent(n.key)}')">
    <div class="ttl">${esc(short(n.title,52))}</div>
    <div class="meta"><span class="chip">${esc(idOf(n))}</span><span class="chip">${esc(n.type)}</span>${chainDots(n)}</div></div>`;
}
function renderBoard(){
  const items=NODES.filter(n=>n.cap.taskLike&&matches(n));
  if(!items.length){view.innerHTML=emptyMsg("No task-like artifacts (no type declares the code field).");return;}
  const {order,buckets,none}=boardColumns(items);
  const cols=order.filter(s=>buckets[s].length).map(s=>
    `<div class="col"><h3>${statusChip(s)}<span class="n">${buckets[s].length}</span></h3>${buckets[s].map(tcard).join("")}</div>`);
  if(none.length)cols.push(`<div class="col"><h3><span class="chip">no status</span><span class="n">${none.length}</span></h3>${none.map(tcard).join("")}</div>`);
  view.innerHTML=`<h2 class="view">Work board</h2>
    <p class="sub">Columns follow each type's declared status order. Every card carries its live chain state.</p>
    <div class="legend"><span><span class="dot on"></span>traces to requirement</span><span><span class="dot on"></span>has code</span><span><span class="dot on"></span>has a passing-path test</span><span><span class="dot bad"></span>open error</span></div>
    <div class="board">${cols.join("")}</div>`;
}

// ---- planning view ----
function scalarMeta(f){
  if(!f)return "";
  return Object.keys(f).sort().filter(k=>k!=="title"&&k!=="id"&&typeof f[k]==="string"&&/\d{4}-\d{2}|^v?\d|H[12]|[Qq][1-4]/.test(f[k]))
    .map(k=>`<span class="chip">${esc(k)}: ${esc(f[k])}</span>`).join(" ");
}
function renderPlan(){
  const items=NODES.filter(n=>n.cap.taskLike);
  const groups={},unscheduled=[];
  items.forEach(n=>{
    const plinks=(n.out||[]).filter(e=>e.to&&!CHAIN_RELS.has(e.rel));
    if(!plinks.length){unscheduled.push(n);return;}
    plinks.forEach(e=>{(groups[e.to]=groups[e.to]||[]).push(n);});
  });
  const keys=Object.keys(groups).sort();
  let html=`<h2 class="view">Planning</h2><p class="sub">Work grouped by the containers it points at (release, sprint, milestone…) — discovered generically from non-chain links, so it adapts to your type set.</p>`;
  if(!keys.length&&!unscheduled.length){view.innerHTML=html+emptyMsg("No planning links yet.");return;}
  keys.forEach(k=>{
    const c=BYKEY[k];const cards=groups[k].filter(matches);
    if(!cards.length&&SEARCH)return;
    html+=`<div class="pgroup"><div class="phead"><span class="t">${c?esc(c.title):esc(k)}</span>${c?statusChip(c.status):""}${c?scalarMeta(c.fields):""}<span class="muted">(${groups[k].length})</span></div><div class="pgrid">${cards.map(tcard).join("")||'<span class="muted">no matches</span>'}</div></div>`;
  });
  const us=unscheduled.filter(matches);
  if(us.length)html+=`<div class="pgroup"><div class="phead"><span class="t">Unscheduled</span><span class="muted">(${unscheduled.length})</span></div><div class="pgrid">${us.map(tcard).join("")}</div></div>`;
  view.innerHTML=html;
}

// ---- graph view ----
function renderGraph(){
  const cols=[[],[],[],[]];
  NODES.forEach(n=>{const c=n.cap.requirement?0:n.cap.taskLike?1:n.cap.test?2:3;cols[c].push(n);});
  const COLW=250,ROWH=52,PADX=24,PADY=54,NW=190,NH=34;
  const pos={};
  cols.forEach((col,ci)=>col.forEach((n,ri)=>pos[n.key]={x:PADX+ci*COLW,y:PADY+ri*ROWH}));
  const rows=Math.max(1,...cols.map(c=>c.length));
  const W=PADX*2+4*COLW, H=PADY+rows*ROWH+PADY;
  let edges="";
  NODES.forEach(n=>(n.out||[]).forEach(e=>{
    const a=pos[n.key],b=pos[e.to];if(!a||!b)return;
    const cls=CHAIN_RELS.has(e.rel)?"e-chain":"e-other";
    const x1=a.x+NW,y1=a.y+NH/2,x2=b.x,y2=b.y+NH/2;
    edges+=`<path class="${cls}" d="M${x1} ${y1} C ${x1+45} ${y1}, ${x2-45} ${y2}, ${x2} ${y2}"/>`;
  }));
  const labels=["Requirements","Work","Tests","Other"].map((t,i)=>cols[i].length?`<text class="collabel" x="${PADX+i*COLW}" y="34">${t}</text>`:"").join("");
  let rects="";
  NODES.forEach(n=>{const p=pos[n.key];if(!p)return;
    const tone=n.cap.requirement?"n-req":n.cap.taskLike?"n-task":n.cap.test?"n-test":"n-other";
    rects+=`<g class="gnode ${tone} ${hasErr(n)?'n-bad':''}" transform="translate(${p.x},${p.y})" onclick="go('node/${encodeURIComponent(n.key)}')">
      <rect width="${NW}" height="${NH}" rx="7"></rect><title>${esc(n.title)}</title>
      <text x="9" y="${NH/2+4}">${esc(short(idOf(n)+"  "+n.title,28))}</text></g>`;
  });
  view.innerHTML=`<h2 class="view">Traceability graph</h2>
    <p class="sub">The chain laid out left→right. Green edges are chain links, grey are other links; artifacts with open errors are outlined red. A broken link can't be drawn (its target isn't a node) — it shows as a red outline on the source. Drag to pan, scroll to zoom.</p>
    <div class="graphwrap"><svg viewBox="0 0 ${W} ${H}" id="gsvg"><g id="gvp">${labels}${edges}${rects}</g></svg></div>`;
  wireZoom();
}
function wireZoom(){
  const svg=document.getElementById("gsvg"),vp=document.getElementById("gvp");
  let t={x:0,y:0,k:1},drag=null;
  const apply=()=>vp.setAttribute("transform",`translate(${t.x},${t.y}) scale(${t.k})`);
  svg.addEventListener("wheel",e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;t.k=Math.max(0.25,Math.min(3,t.k*f));apply();},{passive:false});
  svg.addEventListener("mousedown",e=>{drag={x:e.clientX-t.x,y:e.clientY-t.y};});
  window.addEventListener("mousemove",e=>{if(!drag)return;t.x=e.clientX-drag.x;t.y=e.clientY-drag.y;apply();});
  window.addEventListener("mouseup",()=>drag=null);
}

// ---- detail view ----
function edgeChip(e,dir){
  const other=dir==="out"?e.to:e.from;const on=BYKEY[other];
  const label=dir==="out"?`${e.rel} → ${esc(e.targetType||short(other,24))}`:`${esc(on?on.type:short(other,24))} ${e.rel} →`;
  return `<a class="echip ${e.resolved?'':'bad'}" href="#node/${encodeURIComponent(other)}">${label}</a>`;
}
function renderDetail(key){
  const n=BYKEY[key];
  if(!n){view.innerHTML='<a class="back" href="#trace">← back</a>'+emptyMsg("Artifact not found.");return;}
  const fields=n.fields||{};
  const kv=Object.keys(fields).sort().map(k=>{
    const v=fields[k];const val=Array.isArray(v)?v.map(esc).join("<br>"):esc(v);
    return `<tr><td class="k">${esc(k)}</td><td>${val}</td></tr>`;
  }).join("");
  const findings=(n.findings||[]).map(f=>`<li class="${f.sev==='error'?'':'warn'}">${esc(f.rule)}: ${esc(f.msg)}</li>`).join("");
  const outs=(n.out||[]).map(e=>edgeChip(e,"out")).join("")||'<span class="muted">none</span>';
  const ins=(n.in||[]).map(e=>edgeChip(e,"in")).join("")||'<span class="muted">none</span>';
  view.innerHTML=`<a class="back" href="#${currentTab()}">← back</a>
    <h2 class="view">${esc(idOf(n))} · ${esc(short(n.title,70))}</h2>
    <p class="sub"><span class="chip">${esc(n.type)}</span> ${statusChip(n.status)} <span class="${n.traced?'ok':'no'}">${n.traced?'✓ chain clean':'⚠ chain gap'}</span> <span class="muted">${esc(n.path)}</span></p>
    <div class="detail">
      <div class="card" style="padding:14px">
        <div class="section-t">Outgoing links</div><div>${outs}</div>
        <div class="section-t" style="margin-top:14px">Incoming references</div><div>${ins}</div>
      </div>
      ${findings?`<div class="card" style="padding:14px"><div class="section-t">Gaps</div><ul class="gaps">${findings}</ul></div>`:""}
      <div class="card" style="padding:4px 14px 12px"><div class="section-t" style="margin-top:12px">Fields</div><table class="kv"><tbody>${kv||'<tr><td class="muted">none</td></tr>'}</tbody></table>${n.excerpt?`<p class="excerpt">${esc(n.excerpt)}</p>`:""}</div>
    </div>`;
}

// ---- router ----
function emptyMsg(m){return `<div class="card empty">${esc(m)}</div>`;}
function currentTab(){const h=(location.hash||"").replace(/^#/,"");return h.startsWith("node/")?"trace":(h||"trace");}
function setActiveTab(t){document.querySelectorAll("nav.tabs a").forEach(a=>a.classList.toggle("active",a.dataset.t===t));}
function route(){
  const h=(location.hash||"").replace(/^#/,"")||"trace";
  if(h.indexOf("node/")===0){setActiveTab("");renderDetail(decodeURIComponent(h.slice(5)));window.scrollTo(0,0);return;}
  setActiveTab(h);
  ({trace:renderTrace,board:renderBoard,plan:renderPlan,graph:renderGraph}[h]||renderTrace)();
}
document.getElementById("search").addEventListener("input",e=>{SEARCH=e.target.value.trim().toLowerCase();const h=currentTab();if(!(location.hash||"").includes("node/"))route();});
window.addEventListener("hashchange",route);
route();
</script>
</body>
